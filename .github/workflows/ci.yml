################################################################################
# Portfolio Optimizer — Continuous Integration Workflow
#
# Triggers:
#   - Every push to any branch
#   - Every pull request targeting `main` or `develop`
#
# Jobs:
#   lint-backend    — Ruff + mypy on Python source
#   test-backend    — pytest with coverage (unit + integration)
#   lint-frontend   — ESLint + Prettier check + TypeScript type-check
#   test-frontend   — Vitest unit tests with coverage
#   build-backend   — Docker build (production target) — validates Dockerfile
#   build-frontend  — Docker build (production target) — validates Dockerfile
#   security-scan   — Trivy vulnerability scan on built images
#
# Required GitHub Secrets (none — CI uses no external services):
#   None for lint/test. Docker build uses GITHUB_TOKEN for registry auth.
#
# Caching strategy:
#   - pip packages cached by pyproject.toml hash
#   - npm packages cached by package-lock.json hash
#   - Docker layer cache via GitHub Actions cache backend
################################################################################

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for the same branch/PR to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  # Disable telemetry in CI
  NEXT_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: Lint (Ruff + mypy)
  # ─────────────────────────────────────────────────────────────────────────────
  lint-backend:
    name: "Backend — Lint (Ruff + mypy)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies (dev extras)
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check app/ --output-format=github

      - name: Run Ruff formatter check
        run: ruff format app/ --check

      - name: Run mypy type checker
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: Tests (pytest with coverage)
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: "Backend — Tests (pytest)"
    runs-on: ubuntu-latest
    needs: lint-backend

    # Spin up PostgreSQL and Redis as service containers so integration tests
    # can connect to real services without mocking.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_optimizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_optimizer_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Test database — uses the service container above
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/portfolio_optimizer_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      ENVIRONMENT: testing
      LOG_LEVEL: WARNING
      QUANTUM_TIMEOUT_SECONDS: "30"
      MAX_QUANTUM_ASSETS: "4"
      CACHE_TTL_SECONDS: "60"
      RISK_FREE_RATE: "0.02"
      # Stub key — tests that call OpenAI must mock the client
      OPENAI_API_KEY: "sk-test-placeholder-for-ci"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies (dev extras)
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/portfolio_optimizer_test

      - name: Run pytest (unit + integration)
        run: |
          pytest ../tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v \
            --timeout=120 \
            -x \
            --ignore=../tests/e2e \
            -m "not e2e and not load"
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/portfolio_optimizer_test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: Lint (ESLint + Prettier + TypeScript)
  # ─────────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: "Frontend — Lint (ESLint + Prettier + tsc)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier format check
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run type-check

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: Tests (Vitest)
  # ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: "Frontend — Tests (Vitest)"
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: Docker build validation
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: "Backend — Docker Build"
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (production target)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: false
          tags: portfolio-optimizer-backend:ci-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          # Export image to Docker daemon for security scan
          load: true

      - name: Save backend image as artifact
        run: docker save portfolio-optimizer-backend:ci-${{ github.sha }} | gzip > /tmp/backend-image.tar.gz

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: Docker build validation
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: "Frontend — Docker Build"
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (production target)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: false
          tags: portfolio-optimizer-frontend:ci-${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://api.portfolio-optimizer.example.com
            VITE_WS_BASE_URL=wss://api.portfolio-optimizer.example.com
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          load: true

      - name: Save frontend image as artifact
        run: docker save portfolio-optimizer-frontend:ci-${{ github.sha }} | gzip > /tmp/frontend-image.tar.gz

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Security: Trivy vulnerability scan
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "Security — Trivy Scan"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Don't block the pipeline on security findings — report only
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp/

      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp/

      - name: Load Docker images
        run: |
          docker load < /tmp/backend-image.tar.gz
          docker load < /tmp/frontend-image.tar.gz

      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: portfolio-optimizer-backend:ci-${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: portfolio-optimizer-frontend:ci-${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF results (backend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
        continue-on-error: true

      - name: Upload Trivy SARIF results (frontend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform: Validate IaC
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: "Terraform — Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform fmt check (root module)
        run: terraform fmt -check -recursive
        working-directory: infra/terraform
        continue-on-error: true

      - name: Terraform init (root module — no backend)
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform validate (root module)
        run: terraform validate
        working-directory: infra/terraform

      # Validate each environment config independently
      - name: Terraform init (staging)
        run: terraform init -backend=false
        working-directory: infra/terraform/environments/staging
        continue-on-error: true

      - name: Terraform validate (staging)
        run: terraform validate
        working-directory: infra/terraform/environments/staging
        continue-on-error: true

      - name: Terraform init (production)
        run: terraform init -backend=false
        working-directory: infra/terraform/environments/production
        continue-on-error: true

      - name: Terraform validate (production)
        run: terraform validate
        working-directory: infra/terraform/environments/production
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # CI Gate — all required checks must pass
  # ─────────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: "CI Gate — All Checks Passed"
    runs-on: ubuntu-latest
    needs:
      - lint-backend
      - test-backend
      - lint-frontend
      - test-frontend
      - build-backend
      - build-frontend
      - terraform-validate
    if: always()

    steps:
      - name: Check all required jobs passed
        run: |
          echo "Checking CI job results..."
          FAILED=0

          check_result() {
            local job_name="$1"
            local result="$2"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ $job_name: $result"
              FAILED=1
            else
              echo "✅ $job_name: $result"
            fi
          }

          check_result "lint-backend"      "${{ needs.lint-backend.result }}"
          check_result "test-backend"      "${{ needs.test-backend.result }}"
          check_result "lint-frontend"     "${{ needs.lint-frontend.result }}"
          check_result "test-frontend"     "${{ needs.test-frontend.result }}"
          check_result "build-backend"     "${{ needs.build-backend.result }}"
          check_result "build-frontend"    "${{ needs.build-frontend.result }}"
          check_result "terraform-validate" "${{ needs.terraform-validate.result }}"

          if [[ $FAILED -eq 1 ]]; then
            echo ""
            echo "One or more required CI checks failed. Blocking merge."
            exit 1
          fi

          echo ""
          echo "All CI checks passed ✅"
