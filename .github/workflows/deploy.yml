################################################################################
# GitHub Actions — Build, Push to ECR, and Deploy to ECS
#
# Triggers:
#   - Push to main: build + push + deploy to staging
#   - Push to tags (v*): build + push + deploy to production
#   - Manual dispatch: build + push + deploy to selected environment
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN              — IAM role ARN for OIDC authentication
#   TF_STATE_BUCKET           — S3 bucket for Terraform state (to read ECR URLs)
################################################################################

name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"

jobs:
  ################################################################################
  # Build and Push Backend Image
  ################################################################################
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_uri: ${{ steps.build-push.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "version=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          fi

      - name: Determine ECR repository
        id: ecr-repo
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="production"
          fi
          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "repo=${{ steps.login-ecr.outputs.registry }}/portfolio-optimizer-${ENV}-backend" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.ecr-repo.outputs.repo }}:${{ steps.meta.outputs.version }}
            ${{ steps.ecr-repo.outputs.repo }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-repo.outputs.repo }}:latest
          cache-to: type=inline

  ################################################################################
  # Build and Push Worker Image (same Dockerfile, different CMD)
  ################################################################################
  build-worker:
    name: Build Worker
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "version=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          fi

      - name: Determine ECR repository
        id: ecr-repo
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="production"
          fi
          echo "repo=${{ steps.login-ecr.outputs.registry }}/portfolio-optimizer-${ENV}-worker" >> $GITHUB_OUTPUT

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.ecr-repo.outputs.repo }}:${{ steps.meta.outputs.version }}
            ${{ steps.ecr-repo.outputs.repo }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-repo.outputs.repo }}:latest
          cache-to: type=inline

  ################################################################################
  # Build and Push Frontend Image
  ################################################################################
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "version=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          fi

      - name: Determine ECR repository and API URL
        id: ecr-repo
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="production"
          fi
          echo "repo=${{ steps.login-ecr.outputs.registry }}/portfolio-optimizer-${ENV}-frontend" >> $GITHUB_OUTPUT

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.ecr-repo.outputs.repo }}:${{ steps.meta.outputs.version }}
            ${{ steps.ecr-repo.outputs.repo }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-repo.outputs.repo }}:latest
          cache-to: type=inline

  ################################################################################
  # Deploy to ECS — update services with new task definitions
  ################################################################################
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-backend, build-worker, build-frontend]

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="production"
          fi
          echo "name=$ENV" >> $GITHUB_OUTPUT
          echo "cluster=portfolio-optimizer-${ENV}-cluster" >> $GITHUB_OUTPUT

      - name: Force new deployment — Backend
        run: |
          aws ecs update-service \
            --cluster ${{ steps.env.outputs.cluster }} \
            --service portfolio-optimizer-${{ steps.env.outputs.name }}-backend \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment — Worker
        run: |
          aws ecs update-service \
            --cluster ${{ steps.env.outputs.cluster }} \
            --service portfolio-optimizer-${{ steps.env.outputs.name }}-worker \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment — Frontend
        run: |
          aws ecs update-service \
            --cluster ${{ steps.env.outputs.cluster }} \
            --service portfolio-optimizer-${{ steps.env.outputs.name }}-frontend \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for Backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ steps.env.outputs.cluster }} \
            --services portfolio-optimizer-${{ steps.env.outputs.name }}-backend \
            --no-cli-pager

      - name: Wait for Frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ steps.env.outputs.cluster }} \
            --services portfolio-optimizer-${{ steps.env.outputs.name }}-frontend \
            --no-cli-pager

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | Image Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| backend  | ${{ needs.build-backend.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| worker   | ${{ needs.build-worker.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | ${{ needs.build-frontend.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** ${{ steps.env.outputs.cluster }}" >> $GITHUB_STEP_SUMMARY
