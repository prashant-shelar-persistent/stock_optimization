# ─────────────────────────────────────────────────────────────────────────────
# Portfolio Optimizer — Compose Override (Podman-friendly local dev)
#
# This file is auto-loaded by `docker compose` / `podman-compose` whenever it
# sits next to `docker-compose.yml`. It applies fixes that are needed when the
# stack is run under **rootless Podman** (the default on macOS / modern
# Fedora / RHEL 9+). If you use Docker Desktop instead, see the "Docker
# compatibility" note at the bottom of this file.
#
# Security env vars (Phase 1 hardening)
# --------------------------------------
# This override explicitly re-declares ``REDIS_PASSWORD``, ``SECRET_KEY``,
# and ``ALLOWED_ORIGINS`` for every backend service so that:
#   1. The values are visible in ``docker compose config`` output for auditing.
#   2. Operators can override them per-service if needed (e.g. a test worker
#      with a different Redis DB).
#   3. The override file is the single place to change dev credentials without
#      touching the base ``docker-compose.yml``.
#
# To use a custom password locally, create a ``.env`` file in the project root:
#
#     REDIS_PASSWORD=my_local_redis_password
#     SECRET_KEY=my_local_secret_key
#
# The ``userns_mode: "keep-id"`` fix
# -----------------------------------
# Symptom (from `podman-compose up frontend`):
#
#     EPERM: operation not permitted, open '/app/index.html'
#         at async open (node:internal/fs/promises:637:25)
#         at async Object.readFile (node:internal/fs/promises:1249:14)
#         at async viteIndexHtmlMiddleware …
#
# Cause:
#   * `./frontend` is bind-mounted into the container at `/app`.
#   * Rootless Podman runs inside a user-namespace where your host UID
#     (e.g. 501 on macOS) is mapped to UID 0 *inside* the namespace, and
#     every other UID is shifted by ~100000. The default `node` image runs
#     processes as the unprivileged `node` user (UID 1000), which falls
#     outside the mapping and therefore has **no read permission** on the
#     bind-mounted host files.
#   * Docker Desktop hides this behind its VM and does not need the fix,
#     so the symptom only appears under Podman.
#
# The fix
# -------
# `userns_mode: "keep-id"` tells Podman to map the *host* user 1:1 into the
# container, so file ownership/permissions on the bind-mount match exactly
# what you see on the host. We apply it to every dev service that bind-mounts
# source code for hot-reload.
#
# Docker compatibility:
#   `keep-id` is a Podman-specific value. Docker Engine's `userns_mode`
#   only accepts `host` or an empty string, and recent Docker versions will
#   refuse to start the service with the value `keep-id`. If you are on
#   Docker Desktop, either delete/rename this file or pass
#   ``-f docker-compose.yml`` explicitly so the override is not auto-loaded:
#
#       docker compose -f docker-compose.yml up --build
#
#   Under rootless Podman (the case this file targets) just run:
#
#       podman-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    userns_mode: "keep-id"
    environment:
      # Explicitly propagate security env vars so they appear in
      # `docker compose config` output and can be audited / overridden here.
      REDIS_PASSWORD: "${REDIS_PASSWORD:-devpassword}"
      SECRET_KEY: "${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"

  worker:
    userns_mode: "keep-id"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-devpassword}"
      SECRET_KEY: "${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"

  worker-quantum:
    userns_mode: "keep-id"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-devpassword}"
      SECRET_KEY: "${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"

  celery-beat:
    userns_mode: "keep-id"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-devpassword}"
      SECRET_KEY: "${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"

  frontend:
    userns_mode: "keep-id"
    # Frontend does not need Redis or SECRET_KEY, but ALLOWED_ORIGINS is
    # included for completeness (Vite may use it for proxy configuration).
    environment:
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
