# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration — Portfolio Optimizer
#
# Canonical location: infra/monitoring/prometheus.yml
#
# Mount this file into the Prometheus container at:
#   /etc/prometheus/prometheus.yml
#
# Scrape targets:
#   prometheus          — Prometheus self-monitoring
#   portfolio-optimizer-backend — FastAPI /metrics (prometheus-fastapi-instrumentator)
#   celery-worker       — Celery metrics via celery-prometheus-exporter (port 8888)
#   redis               — Redis metrics via oliver006/redis_exporter (port 9121)
#   postgres            — PostgreSQL metrics via postgres_exporter (port 9187)
#
# Alert rules are loaded from /etc/prometheus/rules/*.yml
# (see prometheus_rules.yml in the same directory).
#
# Retention: 30 days — set via --storage.tsdb.retention.time in docker-compose.
# ─────────────────────────────────────────────────────────────────────────────

global:
  # Default scrape interval for all jobs unless overridden per-job
  scrape_interval: 15s
  # Maximum time a scrape request may take before it is considered failed
  scrape_timeout: 10s
  # How frequently to evaluate alerting and recording rules
  evaluation_interval: 15s
  # Labels attached to every time series and alert produced by this instance
  external_labels:
    environment: "production"
    service: "portfolio-optimizer"

# ── Alerting ──────────────────────────────────────────────────────────────────
# Alertmanager integration — routes alerts from Prometheus to notification channels.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      # Retry failed alert deliveries
      api_version: v2

# ── Rule files ────────────────────────────────────────────────────────────────
# Prometheus loads all files matching these glob patterns at startup and on
# SIGHUP / /-/reload. Both alerting rules and recording rules live here.
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ── Scrape configurations ─────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  # Scrape Prometheus's own /metrics endpoint so we can track its health,
  # memory usage, TSDB head series count, and query engine performance.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          component: "monitoring"
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "prometheus"

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  # Scrapes the /metrics endpoint exposed by prometheus-fastapi-instrumentator.
  #
  # Metrics provided:
  #   http_requests_total{method, handler, status}
  #   http_request_duration_seconds{method, handler, status, le}
  #   http_requests_inprogress{method, handler}
  #
  # Custom application metrics (registered in backend/app/core/metrics.py):
  #   optimization_runs_total{solver, status}
  #   optimization_duration_seconds{solver, le}
  #   quantum_circuit_depth{solver}
  #   agent_node_duration_seconds{node, le}
  #   cache_hits_total{operation}
  #   cache_misses_total{operation}
  - job_name: "portfolio-optimizer-backend"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          component: "api"
    metrics_path: /metrics
    scrape_interval: 15s
    # Honour labels set by the application (e.g., custom metric labels)
    honor_labels: false
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "backend"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  # celery-prometheus-exporter (mher/flower or a dedicated exporter sidecar)
  # exposes Celery task metrics on port 8888.
  #
  # Metrics provided:
  #   celery_tasks_total{state, name}
  #   celery_tasks_runtime_seconds{name, le}
  #   celery_workers_total
  #   celery_task_received_total{name}
  #   celery_task_failed_total{name}
  #
  # This job is optional — comment it out if the exporter is not deployed.
  - job_name: "celery-worker"
    static_configs:
      - targets: ["worker:8888"]
        labels:
          component: "worker"
    metrics_path: /metrics
    scrape_interval: 30s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "celery-worker"

  # ── Redis ────────────────────────────────────────────────────────────────────
  # oliver006/redis_exporter exposes Redis metrics on port 9121.
  #
  # Metrics provided:
  #   redis_up
  #   redis_connected_clients
  #   redis_memory_used_bytes
  #   redis_memory_max_bytes
  #   redis_commands_processed_total
  #   redis_keyspace_hits_total
  #   redis_keyspace_misses_total
  #   redis_expired_keys_total
  #   redis_evicted_keys_total
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          component: "cache"
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "redis"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # prometheuscommunity/postgres-exporter exposes PostgreSQL metrics on port 9187.
  #
  # Metrics provided:
  #   pg_up
  #   pg_stat_database_tup_fetched_total{datname}
  #   pg_stat_database_tup_inserted_total{datname}
  #   pg_stat_database_tup_updated_total{datname}
  #   pg_stat_database_tup_deleted_total{datname}
  #   pg_stat_database_blks_hit_total{datname}
  #   pg_stat_database_blks_read_total{datname}
  #   pg_stat_activity_count{datname, state}
  #   pg_stat_bgwriter_checkpoints_timed_total
  #   pg_stat_bgwriter_checkpoints_req_total
  #   pg_database_size_bytes{datname}
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          component: "database"
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "postgres"
