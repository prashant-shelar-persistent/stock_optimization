# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration — Portfolio Optimizer
#
# Scrape targets:
#   backend       — FastAPI /metrics endpoint (prometheus-fastapi-instrumentator)
#   celery-worker — Celery worker metrics via celery-prometheus-exporter (optional)
#   redis         — Redis metrics via redis_exporter (optional)
#   postgres      — PostgreSQL metrics via postgres_exporter (optional)
#   prometheus    — Prometheus self-monitoring
#
# Retention: 30 days (configured via --storage.tsdb.retention.time in docker-compose)
# ─────────────────────────────────────────────────────────────────────────────

global:
  # How frequently to scrape targets by default
  scrape_interval: 15s
  # How long until a scrape request times out
  scrape_timeout: 10s
  # How frequently to evaluate alerting rules
  evaluation_interval: 15s
  # Labels attached to all time series and alerts produced by this Prometheus instance
  external_labels:
    environment: "production"
    service: "portfolio-optimizer"

# ── Alerting ──────────────────────────────────────────────────────────────────
# Uncomment and configure Alertmanager when alert routing is needed.
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# ── Rule files ────────────────────────────────────────────────────────────────
# Alert and recording rules are loaded from these files.
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ── Scrape configurations ─────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: /metrics
    scrape_interval: 30s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  # Scrapes the /metrics endpoint exposed by prometheus-fastapi-instrumentator.
  # Provides:
  #   http_requests_total{method, handler, status}
  #   http_request_duration_seconds{method, handler, status, le}
  #   http_requests_inprogress{method, handler}
  - job_name: "portfolio-optimizer-backend"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          component: "api"
    metrics_path: /metrics
    scrape_interval: 15s
    # Relabel to add a human-readable instance label
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "backend"

  # ── Celery Worker ───────────────────────────────────────────────────────────
  # If celery-prometheus-exporter is deployed as a sidecar, it exposes metrics
  # on port 8888. This job is disabled by default (comment out if not used).
  # Provides:
  #   celery_tasks_total{state, name}
  #   celery_tasks_runtime_seconds{name, le}
  #   celery_workers_total
  - job_name: "celery-worker"
    static_configs:
      - targets: ["worker:8888"]
        labels:
          component: "worker"
    metrics_path: /metrics
    scrape_interval: 30s
    # Gracefully skip if the exporter is not running
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "celery-worker"

  # ── Redis ───────────────────────────────────────────────────────────────────
  # redis_exporter (oliver006/redis_exporter) exposes Redis metrics on port 9121.
  # Provides:
  #   redis_connected_clients
  #   redis_memory_used_bytes
  #   redis_commands_processed_total
  #   redis_keyspace_hits_total / redis_keyspace_misses_total
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          component: "cache"
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "redis"

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  # postgres_exporter (prometheuscommunity/postgres-exporter) exposes PG metrics
  # on port 9187.
  # Provides:
  #   pg_up
  #   pg_stat_database_tup_fetched_total
  #   pg_stat_database_blks_hit_total
  #   pg_stat_activity_count
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          component: "database"
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "postgres"
