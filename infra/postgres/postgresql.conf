# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL Production Configuration — Portfolio Optimizer
#
# Canonical location: infra/postgres/postgresql.conf
#
# Mount this file into the PostgreSQL container at:
#   /etc/postgresql/postgresql.conf
#
# Then start postgres with:
#   postgres -c config_file=/etc/postgresql/postgresql.conf
#
# Tuning notes:
#   - These settings are optimised for a container with 512 MB memory limit.
#   - Adjust shared_buffers, work_mem, and effective_cache_size if you change
#     the memory limit in docker-compose.prod.yml.
#   - Rule of thumb: shared_buffers = 25% of total RAM,
#                    effective_cache_size = 75% of total RAM.
#
# Reference: https://www.postgresql.org/docs/16/runtime-config.html
# ─────────────────────────────────────────────────────────────────────────────

# ── Connection settings ───────────────────────────────────────────────────────
# Maximum number of concurrent connections.
# asyncpg connection pool default is 10; Celery workers add more.
# Keep this conservative to avoid memory exhaustion.
max_connections = 100

# ── Memory settings ───────────────────────────────────────────────────────────
# Shared memory used for the buffer pool (25% of container memory limit).
# Container limit: 512 MB → shared_buffers = 128 MB
shared_buffers = 128MB

# Memory used for each sort/hash operation per connection.
# With max_connections=100, total potential = 100 × 4MB = 400MB (worst case).
work_mem = 4MB

# Memory for maintenance operations (VACUUM, CREATE INDEX, etc.)
maintenance_work_mem = 64MB

# Planner's estimate of total memory available for disk caching.
# Set to 75% of container memory limit.
effective_cache_size = 384MB

# ── WAL settings ─────────────────────────────────────────────────────────────
# WAL level: replica allows streaming replication if needed in future.
wal_level = replica

# Synchronous commit: off improves write performance at the cost of
# potentially losing the last few transactions on a crash.
# For run history (non-critical data), this is acceptable.
synchronous_commit = off

# WAL writer delay: how often the WAL writer flushes WAL to disk.
wal_writer_delay = 200ms

# Checkpoint settings: spread checkpoints over time to reduce I/O spikes.
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 1GB
min_wal_size = 80MB

# ── Query planner ─────────────────────────────────────────────────────────────
# Enable parallel query execution (useful for analytics queries on run history).
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 8

# ── Logging ───────────────────────────────────────────────────────────────────
# Log to stderr (captured by Docker's json-file logging driver).
log_destination = stderr
logging_collector = off

# Log format: include timestamps and process IDs.
log_line_prefix = '%t [%p] %q%u@%d '

# Log slow queries (> 1 second) for performance analysis.
log_min_duration_statement = 1000

# Log lock waits longer than 1 second.
log_lock_waits = on
deadlock_timeout = 1s

# Do not log successful connections/disconnections (too noisy in production).
log_connections = off
log_disconnections = off

# Log DDL statements (CREATE, ALTER, DROP) for audit trail.
log_statement = ddl

# ── Autovacuum ────────────────────────────────────────────────────────────────
# Autovacuum is critical for preventing table bloat and maintaining statistics.
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ── Statistics ────────────────────────────────────────────────────────────────
# Track I/O timing for pg_stat_user_tables and pg_stat_bgwriter.
track_io_timing = on

# Track function call statistics.
track_functions = pl

# ── Locale and encoding ───────────────────────────────────────────────────────
# These are set at initdb time; listed here for documentation.
# lc_messages = 'C'
# lc_monetary = 'C'
# lc_numeric = 'C'
# lc_time = 'C'

# ── Security ─────────────────────────────────────────────────────────────────
# Require SSL for all connections (enable when TLS certs are configured).
# ssl = on
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'

# Password encryption: use scram-sha-256 (more secure than md5).
password_encryption = scram-sha-256
