# ─────────────────────────────────────────────────────────────────────────────
# Portfolio Optimizer — Production Nginx Configuration
#
# Features:
#   - HTTP → HTTPS redirect
#   - TLS 1.2/1.3 with modern cipher suite
#   - Security headers (HSTS, CSP, X-Frame-Options, etc.)
#   - Rate limiting (API and WebSocket endpoints)
#   - Gzip compression for static assets
#   - Proxy to FastAPI backend (HTTP + WebSocket)
#   - Static asset caching (Vite content-hashed files)
#   - Health check endpoint (no logging)
#   - Access log in JSON format for log aggregation
#
# TLS certificates:
#   Mount your certificates at:
#     /etc/nginx/certs/fullchain.pem  — certificate chain
#     /etc/nginx/certs/privkey.pem    — private key
#     /etc/nginx/certs/dhparam.pem    — DH parameters (generate with:
#                                       openssl dhparam -out dhparam.pem 2048)
#
# To generate self-signed certs for testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout privkey.pem -out fullchain.pem \
#     -subj "/CN=portfolio-optimizer.example.com"
# ─────────────────────────────────────────────────────────────────────────────

# ── Worker configuration ──────────────────────────────────────────────────────
# Use auto to match the number of CPU cores available to the container.
worker_processes auto;

# Maximum number of open file descriptors per worker process.
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker
    worker_connections 4096;
    # Accept multiple connections per event loop iteration
    multi_accept on;
    use epoll;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    # JSON access log format for structured log aggregation (ELK, Loki, etc.)
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;  # Hide nginx version

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API rate limit: 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # Optimization endpoint rate limit: 10 requests/minute per IP
    # (optimization runs are expensive — protect against abuse)
    limit_req_zone $binary_remote_addr zone=optimize_limit:10m rate=10r/m;

    # WebSocket connection limit: 20 connections per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn_limit:10m;

    # Return 429 Too Many Requests instead of 503 for rate limit violations
    limit_req_status 429;
    limit_conn_status 429;

    # ── Proxy settings ────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # ── Upstream: FastAPI backend ─────────────────────────────────────────────
    upstream backend {
        # Docker service name resolves to the backend container(s)
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check endpoint — respond on HTTP for load balancer probes
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ── TLS configuration ─────────────────────────────────────────────────
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS configuration (Mozilla Intermediate compatibility)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # DH parameters for DHE cipher suites
        ssl_dhparam /etc/nginx/certs/dhparam.pem;

        # Session caching
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ──────────────────────────────────────────────────
        # HTTP Strict Transport Security (2 years, include subdomains)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # XSS protection (legacy browsers)
        add_header X-XSS-Protection "1; mode=block" always;

        # Referrer policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions policy — restrict browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # Content Security Policy
        # Adjust 'connect-src' to include your actual API domain.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # ── Static assets (React SPA) ─────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        # Aggressively cache Vite content-hashed assets (JS, CSS, images)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            # Security headers must be repeated in location blocks
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            # Rate limiting: 60 req/min with burst of 20
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;

            # Disable buffering for streaming responses (SSE)
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Optimization endpoint (stricter rate limit) ───────────────────────
        location /api/v1/optimize {
            # Rate limiting: 10 req/min with burst of 5
            limit_req zone=optimize_limit burst=5 nodelay;

            proxy_pass http://backend;
            proxy_buffering off;
            proxy_cache off;

            # Longer timeout for quantum optimization runs
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── WebSocket proxy ───────────────────────────────────────────────────
        location /ws/ {
            # Limit concurrent WebSocket connections per IP
            limit_conn ws_conn_limit 20;

            proxy_pass http://backend;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Disable buffering for real-time streaming
            proxy_buffering off;
            proxy_cache off;

            # Keep WebSocket connections alive for up to 10 minutes
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── Metrics endpoint (internal only) ─────────────────────────────────
        # Restrict /metrics to internal networks only
        location /metrics {
            # Allow only internal Docker networks and localhost
            allow 172.20.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://backend;
        }

        # ── SPA fallback ──────────────────────────────────────────────────────
        # All unmatched routes serve index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;

            # No caching for index.html (it references hashed assets)
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ── Block common attack vectors ───────────────────────────────────────
        # Block access to hidden files (e.g., .git, .env)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block access to backup and config files
        location ~* \.(bak|conf|dist|fla|inc|ini|log|psd|sh|sql|swp)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
