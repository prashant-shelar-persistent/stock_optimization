# ─────────────────────────────────────────────────────────────────────────────
# mypy configuration for the Portfolio Optimizer backend
#
# mypy performs static type checking across the entire `app` package.
# The configuration is tuned for a Python 3.11 FastAPI / async codebase
# using Pydantic v2, SQLAlchemy 2.0, NumPy, LangGraph, and Qiskit.
#
# Run:
#   mypy app                  — type-check the application package
#   mypy app --pretty         — human-readable output
#   mypy app --html-report .mypy_report  — generate HTML report
# ─────────────────────────────────────────────────────────────────────────────

[mypy]
# ── Python version ────────────────────────────────────────────────────────────
python_version = 3.11

# ── Source paths ──────────────────────────────────────────────────────────────
# mypy will check these packages when invoked from the backend/ directory.
files = app

# ── Strictness ────────────────────────────────────────────────────────────────
# Enable a strong but pragmatic set of checks. We do NOT use --strict
# globally because several third-party libraries (Qiskit, PennyLane,
# LangGraph) lack complete type stubs, which would produce too many
# false positives. Instead we enable individual strict flags selectively.

# Warn about functions that return Any implicitly.
warn_return_any = true

# Warn about unused `# type: ignore` comments.
warn_unused_ignores = true

# Warn about unused mypy configuration sections.
warn_unused_configs = true

# Disallow untyped function definitions in our own code.
disallow_untyped_defs = true

# Disallow partially typed function definitions.
disallow_incomplete_defs = true

# Warn when a function is called with an argument typed as Any.
warn_redundant_casts = true

# Check the bodies of functions with no type annotations.
check_untyped_defs = true

# Disallow calling untyped functions from typed code.
disallow_untyped_calls = false   # relaxed: third-party libs often untyped

# Disallow defining functions with untyped decorators.
disallow_untyped_decorators = false  # relaxed: FastAPI/LangGraph decorators

# Disallow Any in type annotations (too strict for scientific/quantum code).
disallow_any_generics = false
disallow_any_explicit = false
disallow_any_unimported = false

# Warn about code that is unreachable after type narrowing.
warn_unreachable = true

# Show error codes in output (useful for targeted `# type: ignore[code]`).
show_error_codes = true

# Show column numbers in error messages.
show_column_numbers = true

# Show the source line that caused the error.
show_error_context = true

# Pretty-print error messages (disable in CI for machine-parseable output).
pretty = false

# ── Import handling ───────────────────────────────────────────────────────────
# Follow imports into stub packages and source files.
follow_imports = normal

# Silence errors from imports that have no stubs or py.typed marker.
# This is the pragmatic choice for scientific/quantum libraries.
ignore_missing_imports = false   # we handle per-module below

# ── Namespace packages ────────────────────────────────────────────────────────
namespace_packages = true
explicit_package_bases = false

# ── Incremental mode ──────────────────────────────────────────────────────────
# Cache results between runs for faster re-checks.
incremental = true
cache_dir = .mypy_cache

# ── Error output ──────────────────────────────────────────────────────────────
# Limit the number of errors shown per file (0 = unlimited).
# Useful during initial adoption to avoid overwhelming output.
# Set to 0 once the codebase is fully typed.
# many_errors_threshold = 0

# ─────────────────────────────────────────────────────────────────────────────
# Per-module overrides
#
# Third-party libraries without complete type stubs are silenced here
# rather than globally, so our own code remains strictly checked.
# ─────────────────────────────────────────────────────────────────────────────

# ── Quantum frameworks ────────────────────────────────────────────────────────
# Qiskit ships partial stubs but many internal modules are untyped.
[mypy-qiskit.*]
ignore_missing_imports = true

[mypy-qiskit_algorithms.*]
ignore_missing_imports = true

[mypy-qiskit_optimization.*]
ignore_missing_imports = true

[mypy-qiskit_aer.*]
ignore_missing_imports = true

# PennyLane does not ship py.typed or complete stubs.
[mypy-pennylane.*]
ignore_missing_imports = true

# ── LangGraph / LangChain ─────────────────────────────────────────────────────
# LangGraph 0.1.x has partial stubs; LangChain stubs are incomplete.
[mypy-langgraph.*]
ignore_missing_imports = true

[mypy-langchain.*]
ignore_missing_imports = true

[mypy-langchain_openai.*]
ignore_missing_imports = true

[mypy-langchain_core.*]
ignore_missing_imports = true

# ── Classical optimization ────────────────────────────────────────────────────
# CVXPY ships stubs but some internal modules are untyped.
[mypy-cvxpy.*]
ignore_missing_imports = true

# SciPy has partial stubs via scipy-stubs; some modules still untyped.
[mypy-scipy.*]
ignore_missing_imports = true

# ── Market data ───────────────────────────────────────────────────────────────
# yfinance does not ship py.typed or stubs.
[mypy-yfinance.*]
ignore_missing_imports = true

# ── Task queue ────────────────────────────────────────────────────────────────
# Celery ships partial stubs; some modules are untyped.
[mypy-celery.*]
ignore_missing_imports = true

# ── Caching ───────────────────────────────────────────────────────────────────
# redis-py ships py.typed; types-redis provides additional stubs.
# No override needed — redis is fully typed.

# ── Database ──────────────────────────────────────────────────────────────────
# SQLAlchemy 2.0 ships py.typed and full stubs — no override needed.
# asyncpg does not ship py.typed.
[mypy-asyncpg.*]
ignore_missing_imports = true

# ── Structured logging ────────────────────────────────────────────────────────
# structlog ships py.typed — no override needed.

# ── Retry library ─────────────────────────────────────────────────────────────
[mypy-tenacity.*]
ignore_missing_imports = true

# ── Alembic ───────────────────────────────────────────────────────────────────
# Alembic ships partial stubs; env.py is auto-generated.
[mypy-alembic.*]
ignore_missing_imports = true

# ── Test files ────────────────────────────────────────────────────────────────
# Relax strictness in test files: allow untyped test helpers and fixtures.
[mypy-tests.*]
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
check_untyped_defs = true

# pytest and pytest plugins do not ship complete stubs.
[mypy-pytest.*]
ignore_missing_imports = true

[mypy-pytest_asyncio.*]
ignore_missing_imports = true

# ── Application modules — strict overrides ────────────────────────────────────
# The core application package is checked with full strictness.
# Individual modules that interact heavily with untyped third-party code
# are given targeted relaxations below.

# Quantum solvers interact with Qiskit/PennyLane internals — allow Any.
[mypy-app.quantum.qaoa_solver]
warn_return_any = false

[mypy-app.quantum.vqe_solver]
warn_return_any = false

[mypy-app.quantum.dispatcher]
warn_return_any = false

# Agent nodes interact with LangGraph internals — allow Any.
[mypy-app.agents.nodes]
warn_return_any = false

[mypy-app.agents.graph]
warn_return_any = false

[mypy-app.agents.explainer]
warn_return_any = false

# Celery worker tasks interact with Celery internals — allow Any.
[mypy-app.workers.tasks]
warn_return_any = false
disallow_untyped_decorators = false

[mypy-app.workers.celery_app]
disallow_untyped_decorators = false

# Data fetcher uses yfinance which is untyped — allow Any returns.
[mypy-app.data.fetcher]
warn_return_any = false
