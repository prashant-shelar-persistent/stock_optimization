version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Portfolio Optimizer — Development Docker Compose
#
# Services:
#   postgres        — PostgreSQL 16 (run history storage)
#   redis           — Redis 7 (cache + Celery broker/backend)
#   backend         — FastAPI application (hot-reload via volume mount)
#   worker          — Celery worker for the *default* queue (classical-only
#                     optimization runs). Runs many concurrent tasks.
#   worker-quantum  — Celery worker dedicated to the *quantum* queue. Kept
#                     separate so a slow quantum job never blocks a classical
#                     run. Lower concurrency because each task is CPU heavy.
#   celery-beat     — Celery beat scheduler (periodic tasks)
#   frontend        — React + Vite dev server (hot-reload)
#
# Security hardening (Phase 1)
# ----------------------------
# Redis is now protected by a password (``requirepass``) and its host port
# binding is restricted to the loopback interface (127.0.0.1) so it is not
# reachable from other hosts on the local network.
#
# The ``REDIS_PASSWORD`` environment variable is propagated to all backend
# services.  The ``Settings._inject_redis_auth`` validator in
# ``app/core/config.py`` automatically rewrites the Redis URLs to embed the
# password in the URL authority, so no other code changes are needed.
#
# The ``SECRET_KEY`` environment variable is also propagated so that
# WebSocket HMAC tokens can be signed and verified.  In development a random
# key is auto-generated per-process if this is left empty (see config.py).
#
# Parallelism notes:
#   Multiple optimization runs are processed in parallel by setting
#   ``--concurrency=N`` (one ``prefork`` child process per slot). Combined
#   with ``worker_prefetch_multiplier=1`` (in ``celery_app.py``) this gives
#   N truly-parallel tasks per worker without one slow task starving others.
#   Adjust via the ``CELERY_DEFAULT_CONCURRENCY`` / ``CELERY_QUANTUM_CONCURRENCY``
#   env vars without rebuilding.
# ─────────────────────────────────────────────────────────────────────────────

# ── Shared environment anchor ─────────────────────────────────────────────────
# Redis URLs intentionally omit the password here; the Settings validator
# in config.py rewrites them at runtime to embed REDIS_PASSWORD.  This keeps
# the password out of the Compose file itself (it is injected via the env var).
x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/portfolio_optimizer
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  ENVIRONMENT: development
  LOG_LEVEL: INFO
  QUANTUM_TIMEOUT_SECONDS: "60"
  MAX_QUANTUM_ASSETS: "8"
  CACHE_TTL_SECONDS: "3600"
  RISK_FREE_RATE: "0.02"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  # ── Security ──────────────────────────────────────────────────────────────
  # REDIS_PASSWORD is read from the host environment or a .env file.
  # A non-empty value causes config.py to rewrite all Redis URLs with auth.
  # In development this defaults to a simple password; change it or leave
  # empty to run without Redis auth (not recommended even locally).
  REDIS_PASSWORD: "${REDIS_PASSWORD:-devpassword}"
  # SECRET_KEY is used to sign WebSocket HMAC tokens.  In development,
  # config.py auto-generates a random key if this is left at the default
  # placeholder, so it is safe to leave unset locally.
  SECRET_KEY: "${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}"
  # ALLOWED_ORIGINS controls CORS.  Defaults to the Vite dev server.
  ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_optimizer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio_optimizer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Security hardening applied:
  #   1. ``requirepass`` — clients must AUTH before any command.
  #   2. ``bind 127.0.0.1`` — only reachable from the loopback interface on
  #      the host; other containers reach it via the Docker bridge network
  #      using the service hostname ``redis``.  The host port is bound to
  #      127.0.0.1 so it is not exposed to the LAN.
  #   3. ``protected-mode yes`` — Redis's own protection layer (redundant
  #      with requirepass but adds defence-in-depth).
  #   4. ``rename-command FLUSHALL ""`` — disables the dangerous FLUSHALL
  #      command so a compromised client cannot wipe all data.
  #   5. ``rename-command CONFIG ""`` — disables CONFIG so a compromised
  #      client cannot reconfigure Redis at runtime.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:-devpassword}"
      --protected-mode yes
      --loglevel notice
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
    volumes:
      - redis_data:/data
    ports:
      # Bind to loopback only — not accessible from other hosts on the LAN
      - "127.0.0.1:6379:6379"
    healthcheck:
      # Use AUTH in the healthcheck so it works with requirepass
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker — default queue (classical optimization runs) ───────────
  # Handles fast classical-only optimization runs. Higher concurrency lets
  # many users submit runs in parallel without queueing.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A app.workers.celery_app worker
             --loglevel=info
             --concurrency=${CELERY_DEFAULT_CONCURRENCY:-4}
             --queues=default
             -n default-worker@%h"

  # ── Celery Worker — quantum queue ─────────────────────────────────────────
  # Dedicated worker for the quantum queue so a long QAOA/VQE job never
  # blocks the default queue. Concurrency is intentionally lower because
  # each quantum simulation is CPU-bound.
  worker-quantum:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A app.workers.celery_app worker
             --loglevel=info
             --concurrency=${CELERY_QUANTUM_CONCURRENCY:-2}
             --queues=quantum
             -n quantum-worker@%h"

  # ── Celery Beat (Periodic Task Scheduler) ─────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler

  # ── Frontend (React + Vite) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3000:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
